<!-- @dsCard group="Components" viewport="700x420" name="Data — Counter & seizure chart" subtitle="Hero time-since counter + calm frequency bar chart." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg); color: var(--fg); padding: 22px; }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:16px; align-items:start; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:22px; box-shadow:var(--shadow-sm); }
  h4 { margin:0 0 14px; font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--fg-muted); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Counter, BarChart } = window.MollyDesignSystem_790ab3;
  const I = (n) => React.createElement('i', {'data-lucide': n});
  const since = new Date(Date.now() - (14*864e5 + 6*36e5 + 12*6e4));
  function Demo(){
    React.useEffect(()=>{ window.lucide.createIcons(); });
    return (
      <div className="grid">
        <div className="card">
          <h4>Counter</h4>
          <Counter since={since} icon={I('heart-pulse')} sub="Continue assim." />
        </div>
        <div className="card">
          <h4>Frequência de crises</h4>
          <BarChart
            height={170}
            data={[
              {label:'Jan',value:4},{label:'Fev',value:3},{label:'Mar',value:5},
              {label:'Abr',value:2},{label:'Mai',value:2},{label:'Jun',value:1,highlight:true},
            ]}
            annotations={[{index:3, label:'Dose ajustada'}]}
          />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide.createIcons(), 30);
</script>
</body>
</html>
