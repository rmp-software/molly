        <MedStatusCard name="Brometo de potássio" dose="500 mg · 2× ao dia" daysRemaining={23}

          chipIcon={I('pill')} icon={I('alert-triangle')} reorderIcon={I('shopping-cart')} onReorder={()=>{}} />

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide.createIcons(), 30);
