<!-- @dsCard group="Components" viewport="700x300" name="Navigation — Bottom tab bar" subtitle="Thumb-reachable, raised center action for Registrar crise." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg); color: var(--fg); padding: 24px; }
  .phone { max-width: 390px; margin: 0 auto; height: 220px; background: var(--surface);
    border:1px solid var(--border); border-radius: 24px; position: relative; overflow: hidden; box-shadow: var(--shadow-md); }
  .stub { padding: 22px; }
  .stub h3 { font-family: var(--font-display); margin: 0 0 4px; }
  .stub p { color: var(--fg-muted); margin:0; font-size: 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { TabBar } = window.MollyDesignSystem_790ab3;
  const I = (n) => React.createElement('i', {'data-lucide': n});
  function Demo(){
    const [tab, setTab] = React.useState('home');
    const labels = {home:'Início', meds:'Remédios', trends:'Tendências', molly:'Molly'};
    React.useEffect(()=>{ window.lucide.createIcons(); });
    return (
      <div className="phone">
        <div className="stub">
          <h3>{labels[tab]}</h3>
          <p>Aba ativa — toque para navegar. O botão central registra uma crise.</p>
        </div>
        <TabBar
          active={tab}
          onChange={setTab}
          items={[
            {id:'home', label:'Início', icon:I('house')},
            {id:'meds', label:'Remédios', icon:I('pill')},
            {id:'trends', label:'Tendências', icon:I('chart-column')},
            {id:'molly', label:'Molly', icon:I('paw-print')},
          ]}
          centerAction={{label:'Crise', icon:I('paw-print'), onClick:()=>{}}}
        />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  setTimeout(()=>window.lucide.createIcons(), 30);
</script>
</body>
</html>
