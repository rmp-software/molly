<!-- @dsCard group="Spacing" viewport="700x200" name="Motion" subtitle="Durations 80→360ms · calm standard easing. Tap to preview." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface); color: var(--fg); padding: 18px 22px; }
  .hint { font-size: 12px; color: var(--fg-muted); margin-bottom: 12px; }
  .r { display:flex; align-items:center; gap:14px; padding: 6px 0; }
  .tk { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); width: 150px; flex:none; }
  .track { flex:1; height: 16px; background: var(--chart-track); border-radius: 999px; position:relative; }
  .dot { position:absolute; top:1px; left:1px; width:14px; height:14px; border-radius:50%; background: var(--brand); }
</style>
</head>
<body>
  <div class="hint">Easings — standard <code>cubic-bezier(.2,0,0,1)</code> · out <code>(.16,1,.3,1)</code> · spring <code>(.34,1.32,.64,1)</code></div>
  <div id="wrap"></div>
  <script>
    const rows = [['--dur-fast','140ms · taps'],['--dur-base','220ms · padrão'],['--dur-slow','360ms · folhas']];
    const cs = getComputedStyle(document.documentElement);
    const wrap = document.getElementById('wrap');
    const dots = [];
    rows.forEach(([v,label]) => {
      const dur = cs.getPropertyValue(v).trim();
      const r = document.createElement('div'); r.className='r';
      r.innerHTML = `<div class="tk">${v} · ${label.split('· ')[1]}</div><div class="track"><div class="dot" style="transition: left ${dur} var(--ease-standard)"></div></div>`;
      wrap.appendChild(r);
      dots.push(r.querySelector('.dot'));
    });
    function run(){ dots.forEach(d=>d.style.left='1px'); requestAnimationFrame(()=>requestAnimationFrame(()=>dots.forEach(d=>d.style.left='calc(100% - 15px)'))); }
    document.body.addEventListener('click', run);
    setInterval(()=>{ dots.forEach(d=> d.style.left = d.style.left==='1px' ? 'calc(100% - 15px)' : '1px'); }, 1400);
  </script>
</body>
</html>
