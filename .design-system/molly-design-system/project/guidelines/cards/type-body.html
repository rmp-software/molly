<!-- @dsCard group="Type" viewport="700x230" name="Body & UI — Hanken Grotesk" subtitle="All running text & controls. Humanist, friendly. 400/500/600/700." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--surface); color: var(--fg); padding: 20px 22px; line-height: var(--lh-normal); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-bottom: 12px; }
  .lead { font-size: 18px; font-weight: 500; color: var(--fg); }
  p { font-size: 15px; color: var(--fg-2); margin: 8px 0 0; max-width: 60ch; }
  .weights { display:flex; gap:18px; margin-top:14px; font-size: 15px; }
  .weights span { color: var(--fg); }
  .cap { font-size:11px; color:var(--fg-muted); display:block; font-family:var(--font-mono); margin-top:2px; }
</style>
</head>
<body>
  <div class="meta">var(--font-body) · Hanken Grotesk</div>
  <div class="lead">Anote a crise em segundos, com uma mão só.</div>
  <p>Você acompanha a frequência ao longo do tempo e recebe um aviso suave quando o estoque de algum remédio está ficando baixo. Calma, sem alarde.</p>
  <div class="weights">
    <span style="font-weight:400">Regular<span class="cap">400 · corpo</span></span>
    <span style="font-weight:500">Medium<span class="cap">500 · ênfase</span></span>
    <span style="font-weight:600">Semibold<span class="cap">600 · rótulos</span></span>
    <span style="font-weight:700">Bold<span class="cap">700 · botões</span></span>
  </div>
</body>
</html>
