<!-- @dsCard group="Type" viewport="700x230" name="Display — Bricolage Grotesque" subtitle="Headings & hero numbers. Warm, characterful. Weights 600/700." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; font-family: var(--font-display); background: var(--surface); color: var(--fg); padding: 20px 22px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); margin-bottom: 14px; letter-spacing:.02em; }
  .xl { font-size: 40px; font-weight: 700; letter-spacing: var(--ls-tight); line-height: 1.05; }
  .lg { font-size: 28px; font-weight: 700; letter-spacing: var(--ls-snug); margin-top: 6px; }
  .md { font-size: 22px; font-weight: 600; margin-top: 8px; }
  .row { display:flex; gap:20px; align-items:baseline; margin-top:14px; }
  .row span { font-size: 13px; color: var(--fg-2); font-family: var(--font-body); }
  b { font-weight:700 } 
</style>
</head>
<body>
  <div class="meta">var(--font-display) · Bricolage Grotesque</div>
  <div class="xl">Está tudo bem com a Molly</div>
  <div class="lg">Resumo da semana</div>
  <div class="md">Medicações de hoje</div>
  <div class="row"><span><b style="font-family:var(--font-display);font-weight:600">600</b> Semibold · títulos de tela</span><span><b style="font-family:var(--font-display);font-weight:700">700</b> Bold · display & números</span></div>
</body>
</html>
