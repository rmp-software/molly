<!-- @dsCard group="Spacing" viewport="700x180" name="Radii" subtitle="xs 6 → xl 28, pill. Cards use lg (20), inputs md (14)." -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--bg); color: var(--fg); padding: 20px 22px; }
  .row { display:flex; gap: 16px; align-items:flex-end; }
  .item { text-align:center; }
  .box { width: 74px; height: 74px; background: var(--brand-soft); border: 1.5px solid var(--brand); }
  .pillbox { width: 110px; height: 48px; background: var(--brand-soft); border: 1.5px solid var(--brand); border-radius: var(--radius-pill); }
  .lbl { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-2); margin-top: 8px; }
  .px { font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl">xs</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm</div><div class="px">10px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md</div><div class="px">14px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg</div><div class="px">20px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl</div><div class="px">28px</div></div>
    <div class="item"><div class="pillbox"></div><div class="lbl">pill</div><div class="px">999px</div></div>
  </div>
</body>
</html>
